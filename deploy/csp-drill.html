<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AP CSP Drill</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #121212; --bg-2: #161616; --surface: #1a1a1a; --surface-2: #232323;
    --border: rgba(255,255,255,0.06); --border-2: rgba(255,255,255,0.10); --border-3: rgba(255,255,255,0.16);
    --text: rgba(255,255,255,0.87); --text-2: rgba(255,255,255,0.60); --text-3: rgba(255,255,255,0.38);
    --csp: #3a87ab; --csp-dim: rgba(58,135,171,0.12); --csp-soft: rgba(58,135,171,0.22);
    --ok: #7fb89a; --ok-dim: rgba(127,184,154,0.14);
    --bad: #d4807e; --bad-dim: rgba(212,128,126,0.14);
    --radius: 8px; --radius-lg: 14px;
    --font-display: 'Instrument Serif', Georgia, serif;
    --font-sans: 'Sora', system-ui, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-sans); font-size: 15px; line-height: 1.55; letter-spacing: -0.005em; -webkit-font-smoothing: antialiased; }
  body { background: radial-gradient(ellipse at 30% -10%, var(--csp-dim) 0%, transparent 55%), var(--bg); min-height: 100vh; }
  .app { max-width: 760px; margin: 0 auto; padding: 48px 24px 96px; }

  .hd { display: flex; justify-content: space-between; align-items: flex-end; gap: 18px; margin-bottom: 36px; flex-wrap: wrap; }
  .hd-title h1 { font-family: var(--font-display); font-weight: 400; font-size: clamp(32px,5vw,44px); line-height: 1; letter-spacing: -0.01em; }
  .hd-title .sub { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.16em; color: var(--text-3); margin-top: 6px; }
  .hd-stats { display: flex; gap: 12px; align-items: center; font-size: 12px; color: var(--text-2); flex-wrap: wrap; }
  .stat { padding: 6px 10px; border: 1px solid var(--border-2); border-radius: var(--radius); font-variant-numeric: tabular-nums; }
  .stat strong { color: var(--text); font-weight: 500; }

  .pg { height: 2px; background: var(--border); border-radius: 999px; margin-bottom: 32px; overflow: hidden; }
  .pg-bar { height: 100%; background: var(--csp); transition: width 0.3s ease; }

  /* QOTD */
  .qotd { background: var(--surface); border: 1px solid var(--border-2); border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 28px; cursor: pointer; transition: border-color .15s; }
  .qotd:hover { border-color: var(--csp-soft); }
  .qotd-label { font-size: 10px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: var(--csp); margin-bottom: 8px; }
  .qotd-q { font-size: 14px; color: var(--text); line-height: 1.5; }
  .qotd-hint { font-size: 11px; color: var(--text-3); margin-top: 6px; }

  /* Modes */
  .modes { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px; }
  .mode-tile { padding: 22px 20px; background: var(--surface); border: 1px solid var(--border-2); border-radius: var(--radius-lg); cursor: pointer; text-align: left; color: var(--text); font: 500 14.5px var(--font-sans); transition: border-color .15s, background .15s, transform .15s; }
  .mode-tile:hover { border-color: var(--csp-soft); background: var(--surface-2); transform: translateY(-1px); }
  .mode-tile .mode-h { font-size: 16px; margin-bottom: 6px; }
  .mode-tile .mode-s { font-size: 12px; color: var(--text-2); line-height: 1.5; font-weight: 400; }
  .mode-tile .mode-tag { display: inline-block; margin-top: 8px; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--csp); }
  .full-width { grid-column: 1 / -1; }

  /* BI picker */
  .bi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px; }
  .bi-tile { padding: 18px 20px; background: var(--surface); border: 1px solid var(--border-2); border-radius: var(--radius-lg); cursor: pointer; text-align: left; color: var(--text); font: 500 13px var(--font-sans); transition: border-color .15s, background .15s, transform .15s; }
  .bi-tile:hover { background: var(--surface-2); transform: translateY(-1px); }
  .bi-tile .bi-num { font-family: var(--font-display); font-size: 22px; font-weight: 400; line-height: 1; margin-bottom: 6px; }
  .bi-tile .bi-name { font-size: 13px; color: var(--text); margin-bottom: 4px; }
  .bi-tile .bi-meta { font-size: 11px; color: var(--text-3); }

  /* Card / quiz */
  .card { background: radial-gradient(ellipse at 50% -30%, var(--csp-dim) 0%, transparent 60%), var(--surface); border: 1px solid var(--border-2); border-radius: var(--radius-lg); padding: 28px 28px 24px; animation: fade .3s ease both; }
  @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .qmeta { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; font-size: 10.5px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-3); flex-wrap: wrap; }
  .tag { color: var(--csp); border: 1px solid var(--csp-soft); padding: 3px 8px; border-radius: 999px; }
  .topic-tag { color: var(--text-3); border: 1px solid var(--border-2); padding: 3px 8px; border-radius: 999px; }
  .qtext { font-size: 17px; line-height: 1.55; color: var(--text); margin-bottom: 22px; }
  .qtext pre { font-family: 'SFMono-Regular', Consolas, monospace; font-size: 13px; background: var(--bg-2); border: 1px solid var(--border); padding: 12px 14px; border-radius: var(--radius); margin: 12px 0; overflow-x: auto; white-space: pre; }

  .opts { display: flex; flex-direction: column; gap: 8px; }
  .opt { display: flex; align-items: flex-start; gap: 12px; padding: 13px 16px; background: var(--bg-2); border: 1px solid var(--border-2); border-radius: var(--radius); color: var(--text); text-align: left; font: 400 14.5px var(--font-sans); letter-spacing: -0.005em; cursor: pointer; transition: border-color .15s, background .15s; }
  .opt:hover:not(:disabled) { border-color: var(--border-3); background: var(--surface); }
  .opt:disabled { cursor: default; }
  .opt-letter { color: var(--text-3); font-weight: 500; font-size: 12.5px; min-width: 14px; padding-top: 1px; letter-spacing: 0.05em; }
  .opt.correct { border-color: var(--ok); background: var(--ok-dim); }
  .opt.correct .opt-letter { color: var(--ok); }
  .opt.wrong { border-color: var(--bad); background: var(--bad-dim); }
  .opt.wrong .opt-letter { color: var(--bad); }
  .opt.dim { opacity: 0.45; }

  .fb { margin-top: 18px; padding: 14px 16px; border-radius: var(--radius); border: 1px solid var(--border-2); background: var(--bg-2); font-size: 13.5px; line-height: 1.6; color: var(--text-2); animation: fade .25s ease both; }
  .fb strong { color: var(--text); font-weight: 500; }
  .fb.ok { border-color: var(--ok); background: var(--ok-dim); color: var(--text); }
  .fb.no { border-color: var(--bad); background: var(--bad-dim); color: var(--text); }

  .actions { display: flex; justify-content: space-between; align-items: center; margin-top: 22px; gap: 10px; flex-wrap: wrap; }
  .actions .left { color: var(--text-3); font-size: 12px; }
  .actions .right { display: flex; gap: 8px; }

  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: var(--radius); background: transparent; color: var(--text); border: 1px solid var(--border-2); cursor: pointer; font: 500 13px var(--font-sans); letter-spacing: -0.005em; transition: background .15s, border-color .15s; }
  .btn:hover { background: var(--surface); border-color: var(--border-3); }
  .btn.primary { background: var(--text); color: #0a0a0a; border-color: transparent; }
  .btn.primary:hover { background: #fff; }
  .btn.csp { background: var(--csp); color: #fff; border-color: transparent; }
  .btn.csp:hover { filter: brightness(1.08); }

  /* Done */
  .done { text-align: center; padding: 48px 24px; animation: fade .4s ease both; }
  .done h2 { font-family: var(--font-display); font-weight: 400; font-size: 48px; line-height: 1; margin-bottom: 12px; }
  .done .pct { color: var(--csp); }
  .done .verdict { font-size: 14px; color: var(--text-2); margin-bottom: 24px; }
  .done .score-est { display: inline-block; margin: 0 auto 20px; padding: 8px 16px; border: 1px solid var(--csp-soft); border-radius: var(--radius); font-size: 13px; color: var(--csp); }
  .bi-breakdown { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; margin: 24px auto; max-width: 520px; }
  .bi-chip { padding: 10px 8px; background: var(--surface); border: 1px solid var(--border-2); border-radius: var(--radius); font-size: 11px; text-align: center; }
  .bi-chip .bc-num { font-size: 17px; font-weight: 500; color: var(--text); }
  .bi-chip .bc-label { color: var(--text-3); margin-top: 2px; }
  .reviews { text-align: left; max-width: 600px; margin: 24px auto 0; }
  .review { padding: 14px 16px; background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; font-size: 13px; }
  .review .rq { color: var(--text-2); font-weight: 500; }
  .review .rans { font-size: 12px; color: var(--text-3); margin-top: 4px; }

  /* Cheat sheet */
  .cheat { animation: fade .3s ease both; }
  .cheat h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--csp); margin: 22px 0 10px; }
  .cheat h3:first-child { margin-top: 0; }
  .cheat ul { padding-left: 20px; line-height: 1.75; font-size: 13.5px; color: var(--text); }
  .cheat li { margin-bottom: 4px; }
  .cheat code { font-family: 'SFMono-Regular', Consolas, monospace; font-size: 12.5px; background: var(--bg-2); border: 1px solid var(--border); padding: 1px 5px; border-radius: 4px; }
  .cheat table { width: 100%; border-collapse: collapse; font-size: 12.5px; margin: 10px 0; }
  .cheat th, .cheat td { padding: 6px 10px; text-align: left; border-bottom: 1px solid var(--border); }
  .cheat th { color: var(--csp); font-weight: 500; text-transform: uppercase; font-size: 10.5px; letter-spacing: 0.12em; }

  /* Written response */
  .wr { animation: fade .3s ease both; }
  .wr-section { background: var(--surface); border: 1px solid var(--border-2); border-radius: var(--radius-lg); padding: 20px 22px; margin-bottom: 14px; }
  .wr-section h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--csp); margin-bottom: 10px; }
  .wr-section p { font-size: 13.5px; color: var(--text-2); line-height: 1.65; margin-bottom: 8px; }
  .wr-section p:last-child { margin-bottom: 0; }
  .wr-section ul { padding-left: 20px; font-size: 13.5px; color: var(--text-2); line-height: 1.75; }
  .wr-section li { margin-bottom: 3px; }
  .wr-section code { font-family: 'SFMono-Regular', Consolas, monospace; font-size: 12px; background: var(--bg-2); border: 1px solid var(--border); padding: 1px 5px; border-radius: 4px; color: var(--text); }
  .wr-row { display: flex; gap: 12px; margin-bottom: 10px; padding: 12px 14px; background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius); }
  .wr-row .wr-pt { font-size: 20px; font-weight: 600; color: var(--csp); min-width: 28px; }
  .wr-row .wr-body { font-size: 13px; color: var(--text-2); line-height: 1.55; }
  .wr-row .wr-body strong { color: var(--text); font-weight: 500; }

  kbd { display: inline-block; padding: 1px 6px; background: var(--bg-2); border: 1px solid var(--border-2); border-radius: 4px; font-family: 'SFMono-Regular', Consolas, monospace; font-size: 11px; color: var(--text-2); line-height: 1.4; }
  hr { border: none; border-top: 1px solid var(--border); margin: 22px 0; }
  .section-label { font-size: 10px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-3); margin-bottom: 12px; margin-top: 28px; }
  .section-label:first-child { margin-top: 0; }

  @media (max-width: 560px) {
    .app { padding: 32px 16px 64px; }
    .modes, .bi-grid { grid-template-columns: 1fr; }
    .bi-breakdown { grid-template-columns: repeat(3,1fr); }
    .card { padding: 20px 18px 18px; }
  }
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
// ─── Big Idea metadata ───────────────────────────────────────
const BIG_IDEAS = [
  { id: "BI 1", label: "Creative Development",           weight: "10–13%", n: 8  },
  { id: "BI 2", label: "Data",                           weight: "17–22%", n: 14 },
  { id: "BI 3", label: "Algorithms & Programming",       weight: "30–35%", n: 23 },
  { id: "BI 4", label: "Computer Systems & Networks",    weight: "11–15%", n: 10 },
  { id: "BI 5", label: "Impact of Computing",            weight: "21–26%", n: 15 },
];

// ─── 70-Question Bank ────────────────────────────────────────
const QUESTIONS = [
  // ── BI 1 — Creative Development (8) ──────────────────────
  {
    bi:"BI 1", topic:"Program Purpose",
    q:"A program runs without crashing but consistently classifies all incoming emails as spam. This is most likely a:",
    opts:["Syntax error","Runtime error","Logic error","Overflow error"],
    correct:2,
    fb:"Runs without crashing but produces wrong output = LOGIC error. Syntax errors prevent running; runtime errors crash mid-execution."
  },
  {
    bi:"BI 1", topic:"Creative Choices",
    q:"Which is the BEST example of a 'creative' choice when developing a study app?",
    opts:["Choosing variable names like score and count","Deciding the app should serve high school students preparing for AP exams","Following the language's required syntax for assignment","Using ASCII rather than Unicode for English text"],
    correct:1,
    fb:"Creative choices = purpose, audience, what the program should do. A, C, D are mechanical/required, not creative."
  },
  {
    bi:"BI 1", topic:"Attribution",
    q:"Which is true about attribution when reusing code from an open-source project?",
    opts:["Open-source means no attribution required","Attribution is required only if you copy code verbatim","Attribution is required when reusing code, even if you modify it, per the project's license","Attribution is needed only for code longer than 100 lines"],
    correct:2,
    fb:"Open-source ≠ no rules. Most licenses require attribution even for modified work. Some add share-alike, noncommercial, etc."
  },
  {
    bi:"BI 1", topic:"Program Design",
    q:"A team is designing a program to recommend study materials. Which activity is most appropriate at the DESIGN stage?",
    opts:["Writing unit tests","Identifying user needs and what the program should do","Fixing runtime errors","Optimizing database queries"],
    correct:1,
    fb:"Design = figuring out purpose and user needs. Writing tests and fixing bugs come AFTER design; query optimization is implementation-level."
  },
  {
    bi:"BI 1", topic:"Iterative Development",
    q:"Which BEST describes iterative development?",
    opts:["Writing the entire program before testing anything","Planning, building, testing, and refining in repeated cycles","Testing only at the end when the program is complete","Dividing the program among team members once and merging at the end"],
    correct:1,
    fb:"Iterative = repeated cycles of plan → build → test → refine. Each cycle improves the product based on feedback from the previous one."
  },
  {
    bi:"BI 1", topic:"Abstraction",
    q:"A programmer uses a library function to generate maps without understanding how it works internally. This illustrates:",
    opts:["A syntax error","Computational thinking","Abstraction — using the function as a black box","A logic error"],
    correct:2,
    fb:"Abstraction = hiding implementation details and exposing only what's needed. Using a library without knowing its internals is classic procedural abstraction."
  },
  {
    bi:"BI 1", topic:"Unintended Use",
    q:"Which of the following is an example of a program being used in a way NOT intended by its creators?",
    opts:["A calculator app used to do arithmetic","A social media platform used to organize a large-scale protest","A word processor used to write a novel","A spreadsheet used to track a household budget"],
    correct:1,
    fb:"Computing enables uses never intended by creators. Social media organizing political movements is a classic unintended use case."
  },
  {
    bi:"BI 1", topic:"Collaboration",
    q:"Two students collaborate on a program: Student A writes data storage functions; Student B writes the user interface. They share code via a version control system. This is an example of:",
    opts:["Functional decomposition and collaboration","Parallel processing","Lossy compression of development effort","Social engineering"],
    correct:0,
    fb:"Breaking a program into parts (decomposition) and dividing work (collaboration) are core software development practices. Version control enables asynchronous teamwork."
  },

  // ── BI 2 — Data (14) ─────────────────────────────────────
  {
    bi:"BI 2", topic:"Binary / Bits",
    q:"How many distinct values can 6 bits represent?",
    opts:["6","12","36","64"],
    correct:3,
    fb:"2^6 = 64 distinct patterns. Max unsigned value = 2^6 − 1 = 63 (values run 0 to 63)."
  },
  {
    bi:"BI 2", topic:"Binary Conversion",
    q:"Convert binary 1011 to decimal.",
    opts:["9","10","11","13"],
    correct:2,
    fb:"1011 = 8 + 0 + 2 + 1 = 11. Powers of 2 from right: 1, 2, 4, 8."
  },
  {
    bi:"BI 2", topic:"Data Representation",
    q:"A digital photograph is 1024 px wide × 768 px tall, with 24-bit color. What is the uncompressed file size in BYTES?",
    opts:["786,432","2,359,296","18,874,368","25,165,824"],
    correct:1,
    fb:"Bits = 1024 × 768 × 24 = 18,874,368. Divide by 8 for bytes = 2,359,296. Answer C is the bits value — classic units trap."
  },
  {
    bi:"BI 2", topic:"Compression",
    q:"Which is a feature of LOSSY compression but NOT lossless?",
    opts:["Reduces file size","Some original information is permanently discarded","The compressed file is usually a different format","Works on text files"],
    correct:1,
    fb:"Lossless preserves every bit; lossy permanently discards info. Both reduce file size. The loss happens at compress time, not each time you open the file."
  },
  {
    bi:"BI 2", topic:"Data Analysis",
    q:"A study finds people who own umbrellas are more likely to experience rain. The most accurate conclusion is:",
    opts:["Umbrellas cause rain","Rain causes umbrella ownership","Correlation does not establish causation; a third factor likely influences both","The data is statistically biased toward urban areas"],
    correct:2,
    fb:"Classic correlation vs. causation. A third variable (weather forecasts) likely drives both. Always look for hidden factors before claiming causation."
  },
  {
    bi:"BI 2", topic:"Algorithm Bug",
    q:"Why is the list [2, 1, 4, 9, 6] problematic for finding the minimum with this code?\n\nsmallest ← 0\nFOR EACH n IN list {\n  IF n < smallest { smallest ← n }\n}",
    opts:["The loop runs too many times","The list is unsorted so it won't work","smallest is initialized to 0, but no list element is less than 0, so it returns 0","MOD is not used"],
    correct:2,
    fb:"Classic 'initialize to 0' bug. No element is < 0 so smallest never updates. Always initialize min to list[1] to handle all value ranges including negatives."
  },
  {
    bi:"BI 2", topic:"Binary Conversion",
    q:"Which binary number equals decimal 25?",
    opts:["11000","11001","10110","11010"],
    correct:1,
    fb:"25 = 16 + 8 + 1 = 11001. Check: 16+8+0+0+1 = 25 ✓"
  },
  {
    bi:"BI 2", topic:"Data Representation",
    q:"A color is represented using 8 bits per channel (red, green, blue). How many unique colors can be represented?",
    opts:["256","512","16,777,216","4,294,967,296"],
    correct:2,
    fb:"8 bits per channel = 256 values per channel. Three channels: 256³ = 16,777,216. This is standard 24-bit (\"true\") color."
  },
  {
    bi:"BI 2", topic:"Compression",
    q:"Run-length encoding represents [5,5,5,5,5,3,3,2] as [(5,5),(2,3),(1,2)]. What does the pair (2,3) mean?",
    opts:["The value 2 appears 3 times","The value 3 appears 2 times","Position 2 has value 3","3 values are encoded starting at position 2"],
    correct:1,
    fb:"RLE format is (count, value). (2,3) = the value 3 appears 2 consecutive times."
  },
  {
    bi:"BI 2", topic:"Data Analysis",
    q:"A school analyzes graduation rates and SAT scores across districts and finds a strong positive correlation. The BEST conclusion is:",
    opts:["Higher SAT scores cause higher graduation rates","Higher graduation rates cause higher SAT scores","Districts with higher SAT scores tend to have higher graduation rates","The data is biased and should be discarded"],
    correct:2,
    fb:"Correlation = variables move together. It does NOT tell us which causes which, or whether a third variable (funding, socioeconomics) drives both."
  },
  {
    bi:"BI 2", topic:"Metadata",
    q:"Which of the following is METADATA, not data?",
    opts:["The text of a photo caption","The photo file itself","The GPS coordinates and timestamp embedded in a photo file","The person's name shown in the photo"],
    correct:2,
    fb:"Metadata = data ABOUT data. GPS + timestamp describe the photo (where/when taken) but are not the photo's content itself."
  },
  {
    bi:"BI 2", topic:"Privacy",
    q:"A researcher combines three anonymized datasets — location data, purchase history, and health records — from different sources. The PRIMARY privacy concern is:",
    opts:["The datasets use different file formats","Cross-referencing can re-identify individuals even though each dataset alone is anonymous","The datasets were not compressed before transfer","Health records are stored in binary"],
    correct:1,
    fb:"The 'mosaic effect': each dataset seems harmless alone, but combining them dramatically increases re-identification risk. This is a core AP CSP privacy concept."
  },
  {
    bi:"BI 2", topic:"Data Representation",
    q:"An audio file is sampled at 44,100 Hz, 16-bit depth, 2 channels (stereo), for 3 minutes. Which expression gives the uncompressed size in bits?",
    opts:["44,100 × 16 × 3","44,100 × 16 × 2 × 180","44,100 × 16 × 2 × 3","44,100 × 2 × 180"],
    correct:1,
    fb:"Bits = sampleRate × bitDepth × channels × seconds. 3 min = 180 sec → 44,100 × 16 × 2 × 180."
  },
  {
    bi:"BI 2", topic:"Data Representation",
    q:"What is the primary advantage of storing data digitally rather than in analog form?",
    opts:["Digital signals are always more accurate than analog","Digital data can be perfectly copied and transmitted without degradation","Analog data cannot represent sound","Digital data uses less storage space per unit of information"],
    correct:1,
    fb:"Digital data (discrete bits) copies perfectly. Analog signals degrade each time they're copied — like a dubbed cassette tape losing quality each generation."
  },

  // ── BI 3 — Algorithms & Programming (23) ─────────────────
  {
    bi:"BI 3", topic:"Loops",
    q:"What does the following code display?\n\nn ← 4\nREPEAT UNTIL (n > 10) {\n  n ← n + 3\n}\nDISPLAY(n)",
    opts:["10","11","12","13"],
    correct:3,
    fb:"REPEAT UNTIL stops when the condition becomes TRUE. Trace: 4→7→10 (10>10 is FALSE, so loop continues) →13 (13>10 is TRUE, stop). Displays 13."
  },
  {
    bi:"BI 3", topic:"Boolean Logic",
    q:"Which expression is equivalent to NOT(age >= 18 AND hasParent)?",
    opts:["age < 18 AND NOT hasParent","age < 18 OR NOT hasParent","age >= 18 OR hasParent","age <= 18 AND hasParent"],
    correct:1,
    fb:"De Morgan's Law: NOT(A AND B) = (NOT A) OR (NOT B). AND flips to OR. NOT(age>=18) = age<18."
  },
  {
    bi:"BI 3", topic:"List Traversal",
    q:"A list scores contains [8, 3, 12, 5, 1]. What does this procedure return?\n\nPROCEDURE mystery(list) {\n  best ← list[1]\n  FOR i ← 2 TO LENGTH(list) {\n    IF list[i] < best { best ← list[i] }\n  }\n  RETURN best\n}",
    opts:["1","8","12","29"],
    correct:0,

// ─── Daily question (date-seeded, consistent per day) ────────
function getDailyQ() {
  const d = new Date();
  const seed = d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
  return QUESTIONS[seed % QUESTIONS.length];
}

// ─── State ───────────────────────────────────────────────────
const state = {
  view: "home",
  mode: null,
  filter: null,
  pool: [],
  i: 0,
  selected: null,
  locked: false,
  results: []
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function startQOTD() {
  const dq = getDailyQ();
  const idx = QUESTIONS.indexOf(dq);
  state.mode = "drill";
  state.filter = "qotd";
  state.view = "drill";
  state.pool = [idx];
  state.i = 0; state.selected = null; state.locked = false; state.results = [];
  renderQuiz();
}

function viewBIPicker() {
  state.view = "bi";
  const biRows = BIG_IDEAS.map(b => {
    const count = QUESTIONS.filter(q => q.bi === b.id).length;
    return `
      <button class="bi-tile" data-bi="${b.id}" style="border-color: var(--border-2);">
        <div class="bi-num">${b.id}</div>
        <div class="bi-name">${b.label}</div>
        <div class="bi-meta">${count} questions · ${b.weight} of exam</div>
      </button>
    `;
  }).join("");

  app.innerHTML = `
    <header class="hd">
      <div class="hd-title">
        <h1>By Big Idea</h1>
        <div class="sub">targeted drill</div>
      </div>
      <div class="hd-stats">
        <button class="btn" id="back-home">Home</button>
      </div>
    </header>
    <div class="bi-grid">${biRows}</div>
  `;
  document.getElementById("back-home").addEventListener("click", viewHome);
  app.querySelectorAll(".bi-tile").forEach(el => {
    el.addEventListener("click", () => startQuiz("drill", el.dataset.bi));
  });
}

function startQuiz(mode, filter) {
  state.mode = mode;
  state.filter = filter || null;
  state.view = mode;
  let indices = QUESTIONS.map((_, i) => i);
  if (filter && filter !== "qotd") indices = indices.filter(i => QUESTIONS[i].bi === filter);
  state.pool = (mode === "test" && !filter) ? indices : shuffle(indices);
  state.i = 0; state.selected = null; state.locked = false; state.results = [];
  renderQuiz();
}

function renderQuiz() {
  const qIdx = state.pool[state.i];
  const q = QUESTIONS[qIdx];
  const progress = (state.i / state.pool.length) * 100;
  const score = state.results.filter(r => r.picked === QUESTIONS[r.qIdx].correct).length;
  const isTest = state.mode === "test";
  const isLast = state.i === state.pool.length - 1;
  const filterLabel = state.filter && state.filter !== "qotd"
    ? BIG_IDEAS.find(b => b.id === state.filter)?.label
    : null;

  const optHTML = q.opts.map((opt, i) => {
    let cls = "opt";
    if (state.locked) {
      if (i === q.correct) cls += " correct";
      else if (i === state.selected) cls += " wrong";
      else cls += " dim";
    }
    return `<button class="${cls}" data-i="${i}" ${state.locked ? "disabled" : ""}><span class="opt-letter">${"ABCD"[i]}</span><span>${escapeHTML(opt)}</span></button>`;
  }).join("");

  const fbHTML = state.locked ? `
    <div class="fb ${state.selected === q.correct ? "ok" : "no"}">
      <strong>${state.selected === q.correct ? "✓ Correct." : "✗ Not quite."}</strong> ${escapeHTML(q.fb)}
    </div>
  ` : "";

  const showScore = !isTest || state.results.length > 0;

  app.innerHTML = `
    <header class="hd">
      <div class="hd-title">
        <h1>${filterLabel || (state.mode === "test" ? "Practice Test" : "Quick Drill")}</h1>
        <div class="sub">${state.i+1} of ${state.pool.length}</div>
      </div>
      <div class="hd-stats">
        ${!isTest || state.locked ? `<div class="stat">Score: <strong>${score}/${state.results.length}</strong></div>` : ""}
        <button class="btn" id="quit">Home</button>
      </div>
    </header>
    <div class="pg"><div class="pg-bar" style="width:${progress}%"></div></div>
    <div class="card">
      <div class="qmeta">
        <span class="tag">${q.bi}</span>
        <span class="topic-tag">${q.topic}</span>
        <span>Q${state.i+1}</span>
      </div>
      <div class="qtext">${formatQ(q.q)}</div>
      <div class="opts">${optHTML}</div>
      ${fbHTML}
      <div class="actions">
        <div class="left">${state.locked ? "" : "Pick one · <kbd>A</kbd>–<kbd>D</kbd>"}</div>
        <div class="right">
          ${state.locked ? `<button class="btn csp" id="next">${isLast ? "Finish →" : "Next →"}</button>` : ""}
        </div>
      </div>
    </div>
  `;

  app.querySelectorAll(".opt").forEach(btn => btn.addEventListener("click", () => {
    if (!state.locked) pickOption(parseInt(btn.dataset.i, 10));
  }));
  document.getElementById("next")?.addEventListener("click", advance);
  document.getElementById("quit").addEventListener("click", viewHome);
}

function pickOption(i) {
  state.selected = i;
  state.locked = true;
  state.results.push({ qIdx: state.pool[state.i], picked: i });
  renderQuiz();
}

function advance() {
  if (state.i >= state.pool.length-1) viewDone();
  else { state.i++; state.selected = null; state.locked = false; renderQuiz(); }
}

function viewDone() {
  state.view = "done";
  const correct = state.results.filter(r => r.picked === QUESTIONS[r.qIdx].correct).length;
  const total = state.results.length;
  const pct = Math.round((correct/total)*100);

  let verdict, scoreEst;
  if (pct >= 90) { verdict = "Solid 4–5 territory. Sleep well."; scoreEst = "AP Score estimate: 5"; }
  else if (pct >= 75) { verdict = "On the 4 track. Quick scan of the cheat sheet in the morning."; scoreEst = "AP Score estimate: 3–4"; }
  else if (pct >= 60) { verdict = "3 territory. Reread the study guide, focus on missed Big Ideas."; scoreEst = "AP Score estimate: 3"; }
  else { verdict = "Focus on BI 3 (Algorithms) — biggest weight, biggest swing. Trace pseudocode slowly."; scoreEst = "AP Score estimate: 2–3"; }

  // Per-BI breakdown
  const biScores = {};
  BIG_IDEAS.forEach(b => { biScores[b.id] = { correct: 0, total: 0 }; });
  state.results.forEach(r => {
    const q = QUESTIONS[r.qIdx];
    biScores[q.bi].total++;
    if (r.picked === q.correct) biScores[q.bi].correct++;
  });

  const biBreakdown = BIG_IDEAS.map(b => {
    const s = biScores[b.id];
    if (!s.total) return "";
    const bpct = Math.round((s.correct/s.total)*100);
    const color = bpct >= 75 ? "var(--ok)" : bpct >= 50 ? "var(--text-2)" : "var(--bad)";
    return `<div class="bi-chip"><div class="bc-num" style="color:${color}">${s.correct}/${s.total}</div><div class="bc-label">${b.id}</div></div>`;
  }).join("");

  const wrong = state.results.filter(r => r.picked !== QUESTIONS[r.qIdx].correct);
  const reviewHTML = wrong.length === 0 ? "" : `
    <div class="reviews">
      <div class="section-label">Review these</div>
      ${wrong.map(r => {
        const q = QUESTIONS[r.qIdx];
        return `<div class="review">
          <div class="rq">[${q.bi} · ${q.topic}] ${escapeHTML(q.q.split("\n")[0])}</div>
          <div class="rans">Your answer: ${"ABCD"[r.picked]} · Correct: ${"ABCD"[q.correct]}</div>
          <div class="rans" style="margin-top:6px;color:var(--text-2)">${escapeHTML(q.fb)}</div>
        </div>`;
      }).join("")}
    </div>
  `;

  // Find worst BI for retry suggestion
  const worstBI = BIG_IDEAS.find(b => {
    const s = biScores[b.id];
    return s.total > 0 && (s.correct/s.total) < 0.6;
  });

  app.innerHTML = `
    <header class="hd">
      <div class="hd-title"><h1>Done</h1><div class="sub">${state.mode === "test" ? "Practice test" : "Drill"} complete</div></div>
      <div class="hd-stats"><button class="btn" id="home2">Home</button></div>
    </header>
    <div class="done">
      <h2><span class="pct">${correct}</span> <span style="color:var(--text-3);font-size:32px">/ ${total}</span></h2>
      <div class="score-est">${scoreEst}</div>
      <div class="verdict">${pct}% correct · ${verdict}</div>
      <div class="bi-breakdown">${biBreakdown}</div>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:8px">
        <button class="btn" id="again">↻ Try again</button>
        ${worstBI ? `<button class="btn" id="retry-bi">🎯 Drill ${worstBI.id}</button>` : ""}
        <button class="btn csp" id="cheat2">📋 Cheat sheet</button>
      </div>
      ${reviewHTML}
    </div>
  `;
  document.getElementById("home2").addEventListener("click", viewHome);
  document.getElementById("again").addEventListener("click", () => startQuiz(state.mode, state.filter));
  document.getElementById("cheat2").addEventListener("click", viewCheat);
  document.getElementById("retry-bi")?.addEventListener("click", () => startQuiz("drill", worstBI.id));
}

function viewCheat() {
  state.view = "cheat";
  app.innerHTML = `
    <header class="hd">
      <div class="hd-title"><h1>Cheat Sheet</h1><div class="sub">memorize before the exam</div></div>
      <div class="hd-stats"><button class="btn" id="back">← Home</button></div>
    </header>
    <div class="cheat">

      <h3>Pseudocode — never forget these</h3>
      <ul>
        <li>Lists are <strong>1-indexed</strong> in AP pseudocode (first element is index 1)</li>
        <li><code>REPEAT UNTIL cond</code> — stops when cond is <strong>TRUE</strong>; runs while FALSE</li>
        <li><code>RANDOM(a, b)</code> — <strong>inclusive of both endpoints</strong></li>
        <li><code>RETURN value</code> ends the procedure and gives back a usable value</li>
        <li><code>DISPLAY</code> only prints — the output cannot be captured or passed to another procedure</li>
        <li>Initialize min/max to <code>list[1]</code>, never to 0 (0 fails for all-positive lists)</li>
        <li><code>APPEND(list, val)</code> adds to end; <code>REMOVE(list, i)</code> removes element at index i</li>
        <li><code>x ← x + 1</code> is valid — assignment overwrites, it's not an equation</li>
        <li>Put <code>RETURN false</code> OUTSIDE the loop when checking if ANY element matches</li>
      </ul>

      <h3>Bit math</h3>
      <ul>
        <li><strong>n bits</strong> → 2ⁿ patterns; max unsigned value = 2ⁿ − 1</li>
        <li><strong>Image bits</strong> = width × height × bitsPerPixel · divide by 8 for bytes</li>
        <li><strong>Audio bits</strong> = sampleRate × bitDepth × channels × seconds</li>
        <li>24-bit color = 2²⁴ ≈ 16.7 million colors (8 bits per R/G/B channel)</li>
        <li>ISPs advertise in <strong>bits/s</strong>; files are in <strong>bytes</strong> — 8× difference, easy trap</li>
        <li>Overflow = result exceeds bit range and wraps</li>
      </ul>

      <h3>Boolean logic — De Morgan's Law</h3>
      <ul>
        <li><code>NOT(A AND B)</code> = <code>(NOT A) OR (NOT B)</code></li>
        <li><code>NOT(A OR B)</code> = <code>(NOT A) AND (NOT B)</code></li>
        <li>AND flips to OR. OR flips to AND. NOT distributes inward.</li>
      </ul>

      <h3>Search &amp; efficiency</h3>
      <ul>
        <li><strong>Linear search</strong> — works on any list, O(n) worst case</li>
        <li><strong>Binary search</strong> — requires <strong>sorted</strong> list, O(log n)</li>
        <li><strong>Decidable</strong> — an algorithm exists that solves it correctly for all inputs</li>
        <li><strong>Undecidable</strong> — no such algorithm exists (Halting Problem is the classic example)</li>
        <li>"Computationally expensive" ≠ "undecidable" — NP-hard problems are hard but decidable</li>
        <li><strong>Heuristic</strong> — practical shortcut, not guaranteed to be optimal</li>
        <li><strong>Reasonable time</strong> = polynomial (nᵏ); <strong>unreasonable</strong> = exponential (2ⁿ)</li>
      </ul>

      <h3>Error types — name them on sight</h3>
      <table>
        <tr><th>Type</th><th>Trigger</th><th>Symptom</th></tr>
        <tr><td><strong>Syntax</strong></td><td>Language rule broken</td><td>Won't run at all</td></tr>
        <tr><td><strong>Runtime</strong></td><td>Illegal operation at execution (div by 0)</td><td>Crashes mid-run</td></tr>
        <tr><td><strong>Logic</strong></td><td>Wrong algorithm</td><td>Runs, wrong output</td></tr>
        <tr><td><strong>Overflow</strong></td><td>Result exceeds bit range</td><td>Wraps to unexpected value</td></tr>
      </table>

      <h3>Protocols — one line each</h3>
      <table>
        <tr><th>Protocol</th><th>Role</th></tr>
        <tr><td><strong>IP</strong></td><td>Addressing &amp; routing — best effort, no guarantee</td></tr>
        <tr><td><strong>TCP</strong></td><td>Reliable, ordered delivery, retransmits lost packets</td></tr>
        <tr><td><strong>UDP</strong></td><td>Fast, unreliable — streaming/games (low latency > reliability)</td></tr>
        <tr><td><strong>HTTP</strong></td><td>Web requests (over TCP)</td></tr>
        <tr><td><strong>HTTPS</strong></td><td>HTTP + TLS encryption + certificate authority verification</td></tr>
        <tr><td><strong>DNS</strong></td><td>Domain name → IP address (distributed phonebook)</td></tr>
      </table>

      <h3>Network performance</h3>
      <ul>
        <li><strong>Bandwidth</strong> — maximum capacity (highway lanes)</li>
        <li><strong>Latency</strong> — one-way travel time (speed, not volume)</li>
        <li><strong>Throughput</strong> — actual rate achieved in practice (always ≤ bandwidth)</li>
        <li>DNS failure ≠ site down — browser can't look up the IP, but the server is still running</li>
        <li>Internet fault tolerance: redundant paths route around failed nodes</li>
      </ul>

      <h3>Parallel computing timing</h3>
      <ul>
        <li>Total time = <strong>sequential portion</strong> + <strong>longest</strong> parallel task</li>
        <li>NOT the sum of all parallel tasks — they run simultaneously</li>
        <li>The sequential portion <strong>caps the maximum speedup</strong> (Amdahl's Law)</li>
        <li>Doubling processors does NOT halve total runtime if any sequential work remains</li>
      </ul>

      <h3>Compression</h3>
      <ul>
        <li><strong>Lossless</strong> — bit-perfect reconstruction; great for text/code (ZIP, PNG)</li>
        <li><strong>Lossy</strong> — data discarded permanently at compress time (JPEG, MP3)</li>
        <li>Opening a lossy file repeatedly does NOT add more loss — damage is fixed at compress time</li>
        <li>Highly random data compresses poorly — compression needs repetition</li>
      </ul>

      <h3>Impact &amp; ethics</h3>
      <ul>
        <li><strong>Privacy</strong> = control over your info · <strong>Security</strong> = protection from unauthorized access (not the same)</li>
        <li>"Anonymous" data can be re-identified by inference or cross-referencing (mosaic effect)</li>
        <li>Digital divide = <em>access</em> + <em>use (skills)</em> + <em>outcome</em> — all three dimensions matter</li>
        <li>Algorithmic bias sources: training data, labels, goals, feedback loops</li>
        <li>Feedback loops amplify bias — bad model → biased output → output becomes training data → worse model</li>
        <li>Open source ≠ no rules — most licenses require attribution (MIT, GPL, CC-BY)</li>
        <li>Direct impact = immediate, intended effect. Indirect = downstream, unintended consequence.</li>
        <li>Phishing = social engineering — exploits people, not technical vulnerabilities</li>
        <li>2FA: something you KNOW (password) + something you HAVE (phone/key)</li>
      </ul>

      <h3>Big Idea exam weights</h3>
      <table>
        <tr><th>Big Idea</th><th>Weight</th><th>Questions in this bank</th></tr>
        <tr><td>BI 3 — Algorithms &amp; Programming</td><td><strong>30–35%</strong></td><td>23</td></tr>
        <tr><td>BI 5 — Impact of Computing</td><td>21–26%</td><td>15</td></tr>
        <tr><td>BI 2 — Data</td><td>17–22%</td><td>14</td></tr>
        <tr><td>BI 4 — Computer Systems &amp; Networks</td><td>11–15%</td><td>10</td></tr>
        <tr><td>BI 1 — Creative Development</td><td>10–13%</td><td>8</td></tr>
      </table>

      <h3>Test-day strategy</h3>
      <ul>
        <li>70 MCQ in 120 min ≈ <strong>1:42 per question</strong></li>
        <li>Flag anything taking more than 2 min — skip and come back</li>
        <li>No penalty for wrong answers — <strong>never leave blank</strong></li>
        <li>If two answers look nearly identical, the correct one is usually one of them</li>
        <li>Read ALL four options before clicking — the best answer may not be the first good one</li>
      </ul>
    </div>
  `;
  document.getElementById("back").addEventListener("click", viewHome);
}

function viewWR() {

    <header class="hd">

// ─── Utilities ───────────────────────────────────────────────
function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

function formatQ(s) {
  if (s.includes("\n")) {
    const lines = s.split("\n");
    const first = escapeHTML(lines[0]);
    const rest = lines.slice(1).join("\n");
    return rest.trim() ? `<div>${first}</div><pre>${escapeHTML(rest)}</pre>` : escapeHTML(s);
  }
  return escapeHTML(s);
}

document.addEventListener("keydown", e => {
  if (state.view !== "drill" && state.view !== "test") return;
  if (!state.locked) {
    const idx = "abcd".indexOf(e.key.toLowerCase());
    if (idx >= 0) { pickOption(idx); e.preventDefault(); }
  } else {
    if (e.key === "Enter" || e.key === " " || e.key === "ArrowRight") { advance(); e.preventDefault(); }
  }
});
